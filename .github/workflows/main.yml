# Название нашего CI/CD пайплайна
name: CI Pipeline

# Указываем когда запускать pipeline:
# - при каждом push в ветки main, development, release
# - при создании Pull Request в ветку main
on:
  push:
    branches: [ main, development, release ]
  pull_request:
    branches: [ main ]

# Задания которые будут выполняться
jobs:
  build-and-test:
    # Используем последнюю версию Ubuntu как среду выполнения
    runs-on: ubuntu-latest
    
    steps:
      # Шаг 1: Скачиваем код репозитория
      - name: Checkout code
        uses: actions/checkout@v3
      
      # Шаг 2: Запускаем тесты - проверяем что все файлы существуют
      - name: Run tests
        run: |
          echo "Running tests..."
          echo "Test 1 - file1.txt exists"
          test -f file1.txt && echo "PASSED" || echo "FAILED"
          echo "Test 2 - file2.txt exists"
          test -f file2.txt && echo "PASSED" || echo "FAILED"
          echo "Test 3 - file3.txt exists"
          test -f file3.txt && echo "PASSED" || echo "FAILED"
          echo "All tests completed!"
      
      # Шаг 3: Сообщаем об успешном завершении сборки
      - name: Build complete
        run: echo "Build successful!"
